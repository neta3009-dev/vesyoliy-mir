apply plugin: 'com.android.application'

android {
    namespace 'io.github.neta3009dev.vesyoliymir'
    compileSdk 34

    defaultConfig {
        applicationId "io.github.neta3009dev.vesyoliymir"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug { debuggable true }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    aaptOptions {
        noCompress "m4a"
    }
}
