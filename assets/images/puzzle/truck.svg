<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800">
  <rect width="400" height="800" fill="#B3E5FC"/>
  <circle cx="340" cy="75" r="55" fill="#FFD700"/>
  <g fill="white" opacity="0.9">
    <ellipse cx="80" cy="130" rx="65" ry="30"/><ellipse cx="140" cy="110" rx="52" ry="23"/>
    <ellipse cx="55" cy="145" rx="40" ry="20"/>
  </g>
  <!-- Road -->
  <rect y="680" width="400" height="120" fill="#757575"/>
  <rect y="700" width="400" height="80" fill="#616161"/>
  <!-- Road lines -->
  <rect x="0" y="745" width="400" height="12" fill="#FFD700" opacity="0.6"/>
  <g fill="white" opacity="0.5">
    <rect x="20" y="720" width="60" height="10" rx="4"/><rect x="160" y="720" width="60" height="10" rx="4"/>
    <rect x="300" y="720" width="60" height="10" rx="4"/>
  </g>
  <!-- Truck shadow -->
  <ellipse cx="200" cy="686" rx="185" ry="14" fill="#222" opacity="0.3"/>
  <!-- CARGO BOX (back of truck) -->
  <rect x="5" y="380" width="255" height="220" rx="8" fill="#F44336"/>
  <!-- Cargo box side detail -->
  <rect x="20" y="395" width="225" height="10" fill="#D32F2F"/>
  <rect x="20" y="575" width="225" height="10" fill="#D32F2F"/>
  <g stroke="#D32F2F" stroke-width="3" opacity="0.5">
    <line x1="70" y1="405" x2="70" y2="575"/><line x1="130" y1="405" x2="130" y2="575"/>
    <line x1="190" y1="405" x2="190" y2="575"/>
  </g>
  <!-- Truck cab -->
  <rect x="255" y="440" width="140" height="160" rx="12" fill="#E53935"/>
  <!-- Cab roof (rounded top) -->
  <path d="M255 440 Q255 370 300 350 L390 350 L395 440Z" fill="#C62828"/>
  <!-- Windshield -->
  <path d="M268 365 L268 435 L390 435 L385 358Z" fill="#81D4FA" opacity="0.85"/>
  <!-- Side window -->
  <rect x="268" y="450" width="115" height="65" rx="8" fill="#81D4FA" opacity="0.75"/>
  <!-- Door handle -->
  <rect x="320" y="488" width="32" height="8" rx="4" fill="#FFD700"/>
  <!-- Headlight -->
  <ellipse cx="390" cy="520" rx="18" ry="13" fill="#FFEE44"/>
  <!-- Exhaust pipe -->
  <rect x="378" y="360" width="16" height="65" rx="7" fill="#555"/>
  <ellipse cx="386" cy="358" rx="10" ry="6" fill="#444"/>
  <!-- Fuel tank -->
  <rect x="258" y="560" width="55" height="30" rx="8" fill="#B71C1C"/>
  <!-- Truck wheels -->
  <!-- Rear dual wheels -->
  <circle cx="70" cy="652" r="65" fill="#1A1A1A"/>
  <circle cx="70" cy="652" r="45" fill="#444"/>
  <circle cx="70" cy="652" r="18" fill="#777"/>
  <circle cx="140" cy="652" r="55" fill="#1A1A1A"/>
  <circle cx="140" cy="652" r="37" fill="#444"/>
  <circle cx="140" cy="652" r="15" fill="#777"/>
  <!-- Front wheel -->
  <circle cx="328" cy="655" r="60" fill="#1A1A1A"/>
  <circle cx="328" cy="655" r="38" fill="#444"/>
  <circle cx="328" cy="655" r="15" fill="#777"/>
  <!-- Bumper -->
  <rect x="255" y="590" width="140" height="22" rx="6" fill="#B71C1C"/>
</svg>
