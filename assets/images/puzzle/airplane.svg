<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="60%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="800" fill="url(#sky)"/>
  <g fill="white" opacity="0.25">
    <ellipse cx="80" cy="700" rx="90" ry="45"/><ellipse cx="180" cy="720" rx="70" ry="35"/>
    <ellipse cx="310" cy="680" rx="80" ry="40"/><ellipse cx="370" cy="710" rx="55" ry="28"/>
  </g>
  <g fill="white" opacity="0.15">
    <ellipse cx="60" cy="180" rx="75" ry="38"/><ellipse cx="140" cy="160" rx="60" ry="30"/>
    <ellipse cx="310" cy="220" rx="65" ry="32"/>
  </g>
  <g fill="white" opacity="0.8">
    <circle cx="30" cy="55" r="3"/><circle cx="90" cy="30" r="2"/><circle cx="200" cy="70" r="3"/>
    <circle cx="350" cy="40" r="2"/><circle cx="380" cy="90" r="3"/>
  </g>
  <!-- Main wings -->
  <path d="M200 390 L20 310 L40 290 L200 370Z" fill="#E0E0E0"/>
  <path d="M200 390 L380 310 L360 290 L200 370Z" fill="#D0D0D0"/>
  <!-- Fuselage -->
  <ellipse cx="200" cy="380" rx="175" ry="52" fill="white"/>
  <!-- Nose -->
  <path d="M372 368 L400 380 L372 392Z" fill="#E8E8E8"/>
  <!-- Tail fin -->
  <path d="M32 360 L10 300 L28 298 L50 365Z" fill="#C8C8C8"/>
  <!-- Horizontal stabilizers -->
  <path d="M45 375 L5 340 L18 337 L55 375Z" fill="#C0C0C0"/>
  <path d="M45 385 L5 420 L18 423 L55 385Z" fill="#BDBDBD"/>
  <!-- Red stripe -->
  <rect x="35" y="374" width="338" height="12" fill="#E63946" opacity="0.85"/>
  <!-- Blue stripe -->
  <rect x="35" y="386" width="338" height="6" fill="#1565C0" opacity="0.7"/>
  <!-- Cockpit windows -->
  <ellipse cx="346" cy="374" rx="22" ry="14" fill="#5BBDFF" opacity="0.9"/>
  <ellipse cx="316" cy="372" rx="16" ry="12" fill="#5BBDFF" opacity="0.8"/>
  <!-- Cabin windows -->
  <g fill="#87CEEB" opacity="0.9">
    <circle cx="225" cy="375" r="9"/><circle cx="258" cy="373" r="9"/>
    <circle cx="290" cy="372" r="9"/><circle cx="122" cy="375" r="9"/>
    <circle cx="155" cy="373" r="9"/><circle cx="188" cy="373" r="9"/>
  </g>
  <!-- Engines -->
  <ellipse cx="145" cy="360" rx="28" ry="20" fill="#777"/>
  <ellipse cx="255" cy="360" rx="28" ry="20" fill="#777"/>
  <!-- Engine nacelle detail -->
  <ellipse cx="145" cy="360" rx="18" ry="12" fill="#555"/>
  <ellipse cx="255" cy="360" rx="18" ry="12" fill="#555"/>
  <!-- Wing flaps (low wings) -->
  <path d="M200 410 L20 450 L40 466 L200 425Z" fill="#C8C8C8"/>
  <path d="M200 410 L380 450 L360 466 L200 425Z" fill="#C0C0C0"/>
</svg>
