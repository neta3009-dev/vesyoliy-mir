name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Accept Android SDK licenses & install platform
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Copy game assets into APK
        run: |
          mkdir -p android/app/src/main/assets/assets
          cp index.html manifest.json sw.js android/app/src/main/assets/
          cp -r assets/. android/app/src/main/assets/assets/

      - name: Generate launcher icons
        run: |
          sudo apt-get install -y imagemagick > /dev/null 2>&1
          for size in 48 72 96 144 192; do
            case $size in
              48)  d=mdpi ;;
              72)  d=hdpi ;;
              96)  d=xhdpi ;;
              144) d=xxhdpi ;;
              192) d=xxxhdpi ;;
            esac
            mkdir -p android/app/src/main/res/mipmap-$d
            convert icon-192.png -resize ${size}x${size} android/app/src/main/res/mipmap-$d/ic_launcher.png
          done

      - name: Set local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vesyoliy-mir
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
